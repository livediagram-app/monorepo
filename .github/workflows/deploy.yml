name: Deploy

# Manual deploy only. Trigger from the Actions tab (or `gh workflow
# run Deploy`) once CI on `main` is green and you're ready to ship.
# It is intentionally NOT chained to CI — a green build no longer
# deploys on its own. Builds each app, then deploys them to
# Cloudflare Workers in dependency order: marketing + live + api in
# parallel → router (which has service bindings to all three, so it
# must deploy last).
on:
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build apps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        # Frontend Clerk publishable key is baked into `next build`
        # at this step. Repo secret because the user doesn't want
        # the value in source even though it's publishable — set in
        # GitHub → Settings → Secrets → Actions. Unset is fine: the
        # ClerkProvider becomes a pass-through and the live app
        # runs in guest-only mode (see apps/live/lib/clerk-config.ts).
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Turn on client-side telemetry emission for the production
          # build (spec/22). A plain public flag, not a secret. The api
          # worker's TELEMETRY_ENABLED is the authoritative gate; this
          # just lets the live editor actually send events. Unset (e.g.
          # local builds, OSS forks) keeps emission off.
          NEXT_PUBLIC_TELEMETRY_ENABLED: 'true'
          # Show the "Continue with Google" OAuth button on the sign-in
          # / get-started pages for the production build. Plain public
          # flag, not a secret. Only takes effect when the Clerk key
          # above is also set and Google SSO is enabled in the Clerk
          # dashboard (see apps/live/lib/clerk-config.ts + spec/04).
          NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: 'true'
        run: pnpm build

      - name: Upload marketing build
        uses: actions/upload-artifact@v4
        with:
          name: marketing-out
          path: apps/marketing/out
          retention-days: 1

      - name: Upload live build
        uses: actions/upload-artifact@v4
        with:
          name: live-out
          path: apps/live/out
          retention-days: 1

      - name: Upload telemetry build
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-out
          path: apps/telemetry/out
          retention-days: 1

      - name: Upload help build
        uses: actions/upload-artifact@v4
        with:
          name: help-out
          path: apps/help/out
          retention-days: 1

  deploy-marketing:
    name: Deploy marketing
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: marketing-out
          path: apps/marketing/out

      - name: Deploy to Cloudflare Workers
        working-directory: apps/marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-telemetry:
    name: Deploy telemetry
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: telemetry-out
          path: apps/telemetry/out

      - name: Deploy to Cloudflare Workers
        working-directory: apps/telemetry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-help:
    name: Deploy help
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: help-out
          path: apps/help/out

      - name: Deploy to Cloudflare Workers
        working-directory: apps/help
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-live:
    name: Deploy live
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: live-out
          path: apps/live/out

      - name: Deploy to Cloudflare Workers
        working-directory: apps/live
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-api:
    name: Deploy api
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The `secrets` context can't be read inside a step `if:`
    # (GitHub only allows env/github/needs/vars there), so lift the
    # Clerk JWKS URL into a job-level env var. The "Sync" step below
    # then gates on `env.CLERK_JWKS_URL` instead of the secret
    # directly. An empty/unset secret yields an empty env var, which
    # the `if:` treats as "skip" — same pure-guest fallback as before.
    env:
      CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
      GUEST_ID_HMAC_SECRET: ${{ secrets.GUEST_ID_HMAC_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `whoami` prints which Cloudflare account the API token sees,
      # so when migrations fail with a 7403 "account not authorized"
      # the log shows immediately whether (a) the token doesn't have
      # D1 Edit scope, or (b) the token belongs to a different
      # account than CF_ACCOUNT_ID. Without this the error is too
      # generic to act on.
      - name: Verify Cloudflare token
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler whoami || true

      # Apply any pending D1 migrations before the worker code goes
      # live. Idempotent: wrangler tracks applied migrations in a
      # bookkeeping table and skips any it's already run. Has to
      # happen BEFORE the worker deploy so the new code doesn't
      # briefly run against a schema it doesn't understand.
      #
      # If a migration's bad, this step will fail and the deploy
      # halts before the worker is updated — that's the desired
      # safety: we'd rather block the deploy than break prod.
      - name: Apply D1 migrations (remote)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # Database arg is the binding name (`DB`) — wrangler resolves
        # it via wrangler.toml. Wrangler 4 auto-skips the confirmation
        # prompt in non-interactive CI environments, so no flag is
        # needed (the `--yes` flag from wrangler 3 was removed).
        # If this step fails, the most common cause is the CF_API_TOKEN
        # secret missing the D1: Edit permission on the account that
        # owns the database — but the `Verify Cloudflare token` step
        # above is the authoritative diagnostic.
        run: pnpm exec wrangler d1 migrations apply DB --remote

      # Push the Clerk JWKS URL as a worker secret so the
      # production worker can verify tokens. Repo secret because the
      # user doesn't want the value in wrangler.toml. `wrangler
      # secret put` overwrites if the secret already exists, so this
      # step is idempotent — rotating the URL is just editing the
      # GitHub secret + re-running deploy. If the secret is empty
      # the api falls through to pure-guest mode (spec/04 + spec/11);
      # skipping the step entirely is safe but leaves an old value
      # in place, so this `if:` keeps the rotation story consistent.
      - name: Sync CLERK_JWKS_URL secret
        if: ${{ env.CLERK_JWKS_URL != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: printf '%s' "$CLERK_JWKS_URL" | pnpm exec wrangler secret put CLERK_JWKS_URL

      # Same provisioning story for the guest-id HMAC secret (spec/04):
      # when present it makes /api/migrate require a signed guest id;
      # empty/unset leaves the worker on legacy unsigned migrate.
      - name: Sync GUEST_ID_HMAC_SECRET secret
        if: ${{ env.GUEST_ID_HMAC_SECRET != '' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: printf '%s' "$GUEST_ID_HMAC_SECRET" | pnpm exec wrangler secret put GUEST_ID_HMAC_SECRET

      - name: Deploy to Cloudflare Workers
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # The D1 binding's `database_id` placeholder in wrangler.toml
        # must be filled in before the first deploy succeeds. Run
        # `wrangler d1 create livediagram` locally once and commit the
        # resulting id. Migrations run via `pnpm db:migrate:remote`
        # for ad-hoc local runs; the deploy applies them automatically
        # in the step above.
        run: pnpm exec wrangler deploy

  deploy-mcp:
    name: Deploy mcp
    # The MCP worker has a service binding to the api worker (spec/62), so api
    # must exist first. Not a router dependency — mcp.livediagram.app is its own
    # host, not a path under the main hostname.
    needs: deploy-api
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        working-directory: apps/mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-router:
    name: Deploy router
    # Router has service bindings to marketing + live + api, so all
    # three must exist before it deploys.
    needs: [deploy-marketing, deploy-live, deploy-api, deploy-telemetry, deploy-help]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        working-directory: apps/router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
