name: Deploy

# Runs only after CI has passed on `main`. Builds each app, then
# deploys them to Cloudflare Workers in dependency order:
#   marketing + live in parallel → router (which has service bindings
#   to both, so it must deploy last).
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build apps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when triggered by a successful CI run (or manually).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Upload marketing build
        uses: actions/upload-artifact@v4
        with:
          name: marketing-out
          path: apps/marketing/out
          retention-days: 1

      - name: Upload live build
        uses: actions/upload-artifact@v4
        with:
          name: live-out
          path: apps/live/out
          retention-days: 1

  deploy-marketing:
    name: Deploy marketing
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: marketing-out
          path: apps/marketing/out

      - name: Deploy to Cloudflare Workers
        working-directory: apps/marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-live:
    name: Deploy live
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: live-out
          path: apps/live/out

      - name: Deploy to Cloudflare Workers
        working-directory: apps/live
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

  deploy-api:
    name: Deploy api
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Apply any pending D1 migrations before the worker code goes
      # live. Idempotent: wrangler tracks applied migrations in a
      # bookkeeping table and skips any it's already run. Has to
      # happen BEFORE the worker deploy so the new code doesn't
      # briefly run against a schema it doesn't understand.
      #
      # If a migration's bad, this step will fail and the deploy
      # halts before the worker is updated — that's the desired
      # safety: we'd rather block the deploy than break prod.
      - name: Apply D1 migrations (remote)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # `--yes` was dropped in current wrangler; non-interactive
        # mode auto-confirms via the "fallback value" path. The
        # database arg `DB` matches the binding name in wrangler.toml.
        run: |
          pnpm exec wrangler d1 migrations apply DB --remote \
            || (echo "::error::D1 migrations failed; halting deploy"; exit 1)

      - name: Deploy to Cloudflare Workers
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # The D1 binding's `database_id` placeholder in wrangler.toml
        # must be filled in before the first deploy succeeds. Run
        # `wrangler d1 create livediagram` locally once and commit the
        # resulting id. Migrations run via `pnpm db:migrate:remote`
        # for ad-hoc local runs; the deploy applies them automatically
        # in the step above.
        run: pnpm exec wrangler deploy

  deploy-router:
    name: Deploy router
    # Router has service bindings to marketing + live + api, so all
    # three must exist before it deploys.
    needs: [deploy-marketing, deploy-live, deploy-api]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        working-directory: apps/router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
