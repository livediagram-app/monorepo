name = "livediagram-api"
main = "src/index.ts"
compatibility_date = "2026-05-29"

# Plain (non-secret) vars. TELEMETRY_ENABLED gates the anonymous,
# first-party product analytics + the public /telemetry dashboard
# (spec/22). "true" turns it on; anything else (or absent) keeps it
# fully off, which is the self-host / OSS-fork default, so a fork
# never ingests or serves analytics unless it opts in. Not a secret,
# so it lives here in the open.
[vars]
TELEMETRY_ENABLED = "true"

# D1 database holding diagrams + participants. The local binding name
# (`DB`) is what `src/db.ts` reads via the Env type. The `database_name`
# is the Cloudflare-side name (must be created via `wrangler d1 create
# livediagram` or the dashboard). `database_id` is filled in after the
# database is created — until then deploys will fail loudly.
[[d1_databases]]
binding = "DB"
database_name = "livediagram"
database_id = "79642003-5866-4c5a-9011-7fbeb0de6b58"
migrations_dir = "migrations"

# R2 bucket holding the bytes of every uploaded image element
# (spec/19). The binding name `IMAGES` is what `src/index.ts` reads
# via the Env type. The bucket must be created out of band via
# `wrangler r2 bucket create livediagram-images` (production) or
# the dashboard. Leaving the binding absent locally puts the api
# in "no uploads" mode: the image endpoints return 503 and the
# editor's palette hides the Image entry. See spec/19 + spec/03
# self-host promise.
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "livediagram-images"

# Per-owner rate limiter (Cloudflare Workers Rate Limiting API).
# Caps writes at 300 / 60s per owner: a generous ceiling for normal
# editing (autosave + comment posts + log appends) but well below
# what a malicious bot would push through. The api worker calls
# `env.WRITE_RATE_LIMITER.limit({ key })` at the top of every write
# endpoint; over-limit requests get a 429. Namespace ids are
# arbitrary local identifiers (Cloudflare scopes by binding name +
# script). Self-host: when this binding is absent the rate-limit
# helper falls through to "allow" so deployments without the
# feature still work.
[[unsafe.bindings]]
name = "WRITE_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 300, period = 60 }

# Per-IP limiter for the anonymous telemetry ingest (POST /api/events,
# spec/22). Separate namespace from the write limiter so abuse of the
# public events endpoint can never eat into a user's diagram-write
# budget. 120 batches / 60s per IP is generous for a real editor
# session (which flushes a handful of batches a minute) while bounding
# how fast one source can flood D1 / inflate the public dashboard.
# Keyed on CF-Connecting-IP in src/index.ts. Absent binding → the
# helper allows, so self-host still works.
[[unsafe.bindings]]
name = "EVENTS_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

# Durable Object for per-diagram realtime (presence + broadcast). One
# instance per diagram id; clients connect via WebSocket through the
# `/api/diagrams/<id>/ws` endpoint.
[[durable_objects.bindings]]
name = "DIAGRAM_ROOM"
class_name = "DiagramRoom"

[[migrations]]
tag = "v1"
new_classes = ["DiagramRoom"]

# Scheduled jobs the worker handles via the `scheduled` export. One
# entry per cron; each fires the same handler with `event.cron` set
# to the matching pattern so the body can dispatch.
#
# `0 3 * * *`: daily at 03:00 UTC. Fires two independent retention
# sweeps on this trigger:
#   - change_log, 90-day floor (item #16 / spec/12). Matches what's
#     surfaced in the Activity Panel; older entries were never user-
#     visible, just sitting on the table.
#   - events, 60-day floor (spec/22 "Retention"). The /telemetry
#     dashboard surfaces a 30-day max window, so anything past 60
#     days is dead storage.
[triggers]
crons = ["0 3 * * *"]

# Per-IP rate limiter for the AI assistance endpoint (POST /api/ai,
# spec/25). Separate namespace so AI abuse never eats into diagram-write
# or telemetry budgets. 20 requests / 60s per IP is generous for a
# real user session while bounding runaway OpenAI spend. Absent binding
# → helper allows, so self-host still works without this feature.
[[unsafe.bindings]]
name = "AI_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 20, period = 60 }

# OPENAI_API_KEY and OPENAI_MODEL are provisioned out-of-band (spec/25):
#
#   - Local dev: drop `OPENAI_API_KEY=sk-...` into `apps/api/.dev.vars`
#     (gitignored). `OPENAI_MODEL` can also go there to override the
#     default (gpt-4o-mini).
#   - Production: `wrangler secret put OPENAI_API_KEY`.
#     `OPENAI_MODEL` can be set as a plain [vars] entry if you want to
#     override the default in production.
#
# When OPENAI_API_KEY is absent the feature is entirely hidden:
# GET /api/capabilities returns { aiEnabled: false } and POST /api/ai
# returns 503. No UI surface appears in the live app.
#
# Two optional plain [vars] harden POST /api/ai against a third-party
# site draining the operator's OpenAI budget. Both default to "off"
# so self-host upgrades don't break:
#
#   - AI_ALLOWED_ORIGINS: comma-separated Origin allow-list for the
#     endpoint. Unset = no check. Hosted livediagram.app sets this
#     to "https://livediagram.app". Self-hosters set it to their own
#     hostname (add "http://localhost:3002" if you want local dev to
#     keep working). Matched verbatim against the request's Origin
#     header, case-sensitive.
#   - AI_REQUIRE_CLERK: when "true", POST /api/ai rejects the
#     X-Owner-Id guest path with 401 sign_in_required. Hosted
#     livediagram.app sets this to "true" (paired with Clerk auth).
#     OSS self-hosters who don't run Clerk leave it unset so guests
#     can still use AI.
#
# Both are plain [vars] (no secret material), set them in this file,
# the Cloudflare dashboard, or `.dev.vars` for local testing.

# CLERK_JWKS_URL is provisioned out-of-band so the value never lands
# in the public repo (spec/06):
#
#   - Local dev: drop `CLERK_JWKS_URL=https://...` into
#     `apps/api/.dev.vars` (gitignored). Wrangler reads it on the
#     next `wrangler dev`.
#   - Production: stored as a Cloudflare Worker secret via
#     `wrangler secret put CLERK_JWKS_URL`. The deploy workflow
#     pulls it from the GitHub repo secret `CLERK_JWKS_URL` and
#     pipes it into `wrangler secret put` on every deploy so the
#     value can rotate by editing the GitHub secret. Secrets
#     persist across deploys independently of this file.
#
# When the secret is unset the api worker stays in pure-guest mode
# and trusts `X-Owner-Id` exclusively (spec/04 + spec/11). Get the
# URL from the Clerk dashboard → API Keys → "Show JWKS URL"; format
# is `https://<your-instance>.clerk.accounts.dev/.well-known/jwks.json`
# (test tenant) or `https://clerk.<your-domain>/.well-known/jwks.json`
# (production tenant).
