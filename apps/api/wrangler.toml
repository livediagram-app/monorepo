name = "livediagram-api"
main = "src/index.ts"
compatibility_date = "2026-05-29"

# D1 database holding diagrams + participants. The local binding name
# (`DB`) is what `src/db.ts` reads via the Env type. The `database_name`
# is the Cloudflare-side name (must be created via `wrangler d1 create
# livediagram` or the dashboard). `database_id` is filled in after the
# database is created — until then deploys will fail loudly.
[[d1_databases]]
binding = "DB"
database_name = "livediagram"
database_id = "79642003-5866-4c5a-9011-7fbeb0de6b58"
migrations_dir = "migrations"

# R2 bucket holding the bytes of every uploaded image element
# (spec/19). The binding name `IMAGES` is what `src/index.ts` reads
# via the Env type. The bucket must be created out of band via
# `wrangler r2 bucket create livediagram-images` (production) or
# the dashboard. Leaving the binding absent locally puts the api
# in "no uploads" mode: the image endpoints return 503 and the
# editor's palette hides the Image entry. See spec/19 + spec/03
# self-host promise.
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "livediagram-images"

# Durable Object for per-diagram realtime (presence + broadcast). One
# instance per diagram id; clients connect via WebSocket through the
# `/api/diagrams/<id>/ws` endpoint.
[[durable_objects.bindings]]
name = "DIAGRAM_ROOM"
class_name = "DiagramRoom"

[[migrations]]
tag = "v1"
new_classes = ["DiagramRoom"]

# Scheduled jobs the worker handles via the `scheduled` export. One
# entry per cron; each fires the same handler with `event.cron` set
# to the matching pattern so the body can dispatch.
#
# `0 3 * * *` — daily at 03:00 UTC. Drops change_log entries older
# than 90 days (item #16 / spec/12). The 90-day retention matches
# what's surfaced in the Activity Panel today; older entries were
# never user-visible, just sitting on the table.
[triggers]
crons = ["0 3 * * *"]

# CLERK_JWKS_URL is provisioned out-of-band so the value never lands
# in the public repo (spec/06):
#
#   - Local dev: drop `CLERK_JWKS_URL=https://...` into
#     `apps/api/.dev.vars` (gitignored). Wrangler reads it on the
#     next `wrangler dev`.
#   - Production: stored as a Cloudflare Worker secret via
#     `wrangler secret put CLERK_JWKS_URL`. The deploy workflow
#     pulls it from the GitHub repo secret `CLERK_JWKS_URL` and
#     pipes it into `wrangler secret put` on every deploy so the
#     value can rotate by editing the GitHub secret. Secrets
#     persist across deploys independently of this file.
#
# When the secret is unset the api worker stays in pure-guest mode
# and trusts `X-Owner-Id` exclusively (spec/04 + spec/11). Get the
# URL from the Clerk dashboard → API Keys → "Show JWKS URL"; format
# is `https://<your-instance>.clerk.accounts.dev/.well-known/jwks.json`
# (test tenant) or `https://clerk.<your-domain>/.well-known/jwks.json`
# (production tenant).
