# livediagram MCP server (spec/62). Its own Worker + hostname
# (mcp.livediagram.app), separate from the api worker — distinct dependency
# surface (MCP SDK, OAuth/KV, the resvg WASM rasteriser) and public origin.
name = "livediagram-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-29"
# nodejs_compat for the MCP SDK's transport internals; WASM modules (resvg) are
# bundled by wrangler directly.
compatibility_flags = ["nodejs_compat"]

# Pin a fixed local dev port so `pnpm dev` doesn't race the api worker:
# both `wrangler dev` invocations otherwise default to 8787. The api keeps
# 8787; mcp takes 8788. Dev-only, no effect on the deployed worker.
[dev]
port = 8788

# Bundle the embedded font (fonts/Inter-Regular.ttf) as raw bytes so render.ts
# can hand it to resvg as a fontBuffer — Workers have no system fonts, so
# without this the PNG renders shapes but no text (spec/62 §5).
[[rules]]
type = "Data"
globs = ["**/*.ttf"]

[vars]
# Where the OAuth consent page lives (apps/live). Self-hosters set their own
# live origin; the authorize endpoint redirects the signed-in user here.
CONSENT_BASE_URL = "https://livediagram.app"

# Its own hostname `mcp.livediagram.app` (spec/62) — NOT declared here. Like
# every other worker on this platform (the router included), the public hostname
# is attached in the Cloudflare dashboard, not via wrangler: the deploy
# CF_API_TOKEN is scoped to upload worker scripts, not manage zone routes / DNS.
# Attach the custom domain once under Workers → livediagram-mcp → Domains &
# Routes. Self-hosters do the same with their own host, then point
# CONSENT_BASE_URL + the live app's NEXT_PUBLIC_MCP_ORIGIN at it.

# Reach the api worker over a service binding (not public DNS). Every tool
# forwards to /api/* carrying the caller's `Authorization: Bearer lvd_…`
# token, which the api already accepts on every route (spec/61 §3.3), so no
# api authorization change is needed for the tools (spec/62 §2).
[[services]]
binding = "API"
service = "livediagram-api"

# OAuth 2.1 state (spec/62 §3): client registrations, authorize sessions, and
# codes — all short TTLs. Provision with `wrangler kv namespace create OAUTH_KV`
# and paste the id here (the api worker needs no KV; token storage stays in D1).
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "b6f3814b4a4e4e51b8b88412915d8d84"
